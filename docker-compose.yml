version: '3.8'

services:
  mongodb:
    image: mongo:7.0
    container_name: cruzen_mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASS}
      MONGO_INITDB_DATABASE: cruzendigital
    ports:
      - "127.0.0.1:27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - cruzen_net
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: cruzen_backend
    restart: unless-stopped
    env_file: ./backend/.env
    environment:
      MONGO_URI: mongodb://${MONGO_ROOT_USER}:${MONGO_ROOT_PASS}@mongodb:27017/cruzendigital?authSource=admin
      NODE_ENV: production
    expose:
      - "5000"
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - cruzen_net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: cruzen_frontend
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /etc/letsencrypt/live/cruzendigital.us.cc/fullchain.pem:/etc/nginx/ssl/fullchain.pem:ro
      - /etc/letsencrypt/live/cruzendigital.us.cc/privkey.pem:/etc/nginx/ssl/privkey.pem:ro
      - /var/www/certbot:/var/www/certbot:ro
    depends_on:
      - backend
    networks:
      - cruzen_net

volumes:
  mongo_data:

networks:
  cruzen_net:
    driver: bridge
